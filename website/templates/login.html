
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <meta name="application-name" content="iDashboard">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="iDashboard">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Login | iDashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

  <!-- Load Toast Script -->
  <script src="{{ url_for('static', filename='js/toast.js') }}?v=toast-fix-1"></script>
  <script src="{{ url_for('static', filename='js/pwa.js') }}?v=pwa-1"></script>

  <button type="button" class="pwa-install-btn fixed right-4 top-4 z-20 inline-flex items-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold text-slate-800 shadow-lg shadow-slate-200/60 transition-colors hover:bg-slate-50">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v12"></path>
      <path d="m7 10 5 5 5-5"></path>
      <path d="M5 21h14"></path>
    </svg>
    <span>Install App</span>
  </button>

  <!-- Decorative Background Elements -->
  <div class="absolute -top-24 -left-24 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl"></div>

  <div class="w-full max-w-md z-10">

    <!-- Login Card -->
    <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 p-8 md:p-10 border border-slate-100">
      <form action="/login" method="POST" class="space-y-6">
        <!-- Username Field -->
        <div>
          <div class="mb-6">
            <h2 class="text-xl font-bold text-center text-indigo-600">LOG IN</h2>
          </div>
          <label for="username" class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>
            </div>
            <input type="text" id="username" name="username" required 
              class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all outline-none placeholder:text-slate-400" 
              placeholder="Enter your username">
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
            <a href="#" class="text-xs font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Forgot password?</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <input type="password" id="password" name="password" required 
              class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all outline-none placeholder:text-slate-400" 
              placeholder="••••••••">
          </div>
        </div>

        <!-- Date Selector -->
        <div>
          <label for="date-selector" class="block text-sm font-semibold text-slate-700 mb-2">
            Date Selector
          </label>
          <input 
            type="date" 
            id="date-selector" 
            name="date-selector"
            class="block w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl text-slate-900 text-sm 
                  focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all outline-none"
          >
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-sm hover:bg-slate-800 focus:ring-4 focus:ring-slate-900/20 transition-all active:scale-[0.98] shadow-lg shadow-slate-900/20">
          Sign in to account
        </button>
      </form>
    </div>

    <!-- Footer Links -->
    <p class="text-center mt-8 text-slate-500 text-sm">
      Don't have an account? 
      <a href="#" class="font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Create account</a>
    </p>
  </div>
  
  <!-- Flash Messages as Toast Notifications -->
  <script>
    // Display Flask flash messages as toasts on page load
    document.addEventListener('DOMContentLoaded', function() {
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            window.toast.show({{ message|tojson }}, {{ category|tojson }});
          {% endfor %}
        {% endif %}
      {% endwith %}
    });
  </script>
  
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");

      const formattedDate = `${yyyy}-${mm}-${dd}`;
      document.getElementById("date-selector").value = formattedDate;
    });
  </script>
</body>
</html>

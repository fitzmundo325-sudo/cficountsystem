<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Maintenance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-white flex items-center justify-center p-6">
  <main class="w-full max-w-xl text-center">
    <div class="mx-auto mb-6 flex h-20 w-20 items-center justify-center rounded-3xl bg-amber-400/10 text-4xl ring-1 ring-amber-300/30">⚙</div>
    <p class="mb-3 text-xs font-bold uppercase tracking-[0.3em] text-amber-300">Maintenance Mode</p>
    <h1 class="text-4xl font-bold tracking-tight sm:text-5xl">We’ll be back shortly.</h1>
    <p class="mx-auto mt-5 max-w-lg text-base leading-7 text-slate-300">{{ maintenance_mode.message or 'We are currently improving the system. Please check back shortly.' }}</p>
    <div class="mt-8 rounded-2xl border border-slate-800 bg-slate-900/60 p-4 text-sm text-slate-400">Your session is safe. Refresh this page after maintenance is complete.</div>
    <div class="mt-6 flex justify-center gap-3">
      <button onclick="window.location.reload()" class="rounded-xl bg-white px-5 py-2.5 text-sm font-semibold text-slate-900 hover:bg-slate-200">Check Again</button>
      {% if current_user.is_authenticated %}<a href="{{ url_for('auth.logout') }}" class="rounded-xl border border-slate-700 px-5 py-2.5 text-sm font-semibold text-slate-300 hover:bg-slate-800">Logout</a>{% endif %}
    </div>
  </main>
</body>
</html>
